name: MoonSeal CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Configure wrapper path (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "$GITHUB_WORKSPACE/.github/bin" >> "$GITHUB_PATH"

      - name: Configure wrapper path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "$env:GITHUB_WORKSPACE/.github/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show toolchain
        run: moon version --all

      - name: Run moon check
        run: moon check

      - name: Run moon fmt
        run: moon fmt --deny-warn

      - name: Run moon info
        run: moon info --deny-warn

      - name: Run moon test
        run: moon test

      - name: Run quality gate examples
        run: |
          moon run --target js cmd/main -- scan fixtures/well_tested
          moon run --target js cmd/main -- gate fixtures/well_tested
          moon run --target js cmd/main -- gate fixtures/untested
          moon run --target js cmd/main -- mutants fixtures/mutation_targets
          moon run --target js cmd/main -- explain fixtures/well_tested
